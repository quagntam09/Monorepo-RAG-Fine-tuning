services:
  indexer:
    build:
      context: ..
      dockerfile: deploy/indexer/Dockerfile
    env_file:
      - ../.env.deploy.example
    volumes:
      - ../paper:/app/paper:ro
      - ../.cache:/app/.cache
      - ../outputs:/app/outputs
    profiles:
      - jobs

  reader:
    build:
      context: ..
      dockerfile: deploy/reader/Dockerfile
    env_file:
      - ../.env.deploy.example
    ports:
      - "8081:8081"
    volumes:
      - ../artifacts:/app/artifacts:ro

  synthesis:
    build:
      context: ..
      dockerfile: deploy/synthesis/Dockerfile
    env_file:
      - ../.env.deploy
    environment:
      RAG_READER_SERVICE_URL: http://reader:8081
    ports:
      - "8080:8080"
    volumes:
      - ../paper:/app/paper:ro
      - ../.cache:/app/.cache
    depends_on:
      - reader

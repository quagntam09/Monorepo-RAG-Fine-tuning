services:
  indexer:
    build:
      context: ..
      dockerfile: deploy/indexer/Dockerfile
    env_file:
      - ../.env.deploy.example
    volumes:
      - ../paper:/app/paper:ro
      - ../.cache:/app/.cache
      - ../outputs:/app/outputs
    profiles:
      - jobs
    network_mode: "host"

  reader:
    build:
      context: ..
      dockerfile: deploy/reader/Dockerfile
    env_file:
      - ../.env.deploy.example
    volumes:
      - ../artifacts:/app/artifacts:ro
    network_mode: "host"

  synthesis:
    build:
      context: ..
      dockerfile: deploy/synthesis/Dockerfile
    env_file:
      - ../.env.deploy
    environment:
      RAG_READER_SERVICE_URL: http://localhost:8081
    volumes:
      - ../paper:/app/paper:ro
      - ../.cache:/app/.cache
    network_mode: "host"

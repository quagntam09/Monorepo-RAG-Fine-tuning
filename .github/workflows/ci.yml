name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  reader-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run reader evaluation
        run: |
          python -m rag_chatbox.evaluate_eval_set --mode reader --top-k 5 --limit 5
      - name: Validate reader artifact contract
        run: |
          python - <<'PY'
          from rag_chatbox.reader_distilbert import validate_reader_artifact
          from pathlib import Path
          try:
              validate_reader_artifact(Path('artifacts/readers/run_best'), require_metadata=False)
          except Exception as exc:
              raise SystemExit(f'Artifact contract check failed: {exc}')
          print('artifact contract ok')
          PY

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
      - name: Run unit tests
        run: |
          python -m unittest discover -s tests -p 'test_*.py'
